name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'skyramp-testbot[bot]' }}

jobs:
  testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot') && github.event.comment.user.login != 'skyramp-testbot[bot]')
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: skyramp/testbot@v0.10.1
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

          # Build and start Directus from the PR branch using SQLite.
          targetSetupCommand: 'docker compose -f docker-compose.eval.yml up -d --build'

          # The full build can be slow; give it room before the readiness check times out.
          targetReadyCheckTimeout: '300'

          # Pin the MCP version that ships the DOM Analyzer + URL-cache work.
          skyrampMcpVersion: '0.2.0-rc.1'

          # Conservative limits for first runs; bump later if cost is fine.
          maxRecommendations: '10'
          maxGenerate: '2'
